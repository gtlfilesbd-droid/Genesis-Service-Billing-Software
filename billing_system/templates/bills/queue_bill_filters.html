{# Same filter fields as Bills & Invoices; reset_url = url name e.g. bill_queue_pending #}
<div class="card bill-filter-card border-0 shadow-sm mb-3">
    <div class="card-body p-3 p-md-4">
        <form method="get" class="row g-3 align-items-end">
            <div class="col-xl-3 col-lg-4 col-md-6">
                <label class="form-label">Search</label>
                <input type="text" name="search" value="{{ search }}" class="form-control" placeholder="Invoice #, bill ref, client…">
            </div>
            <div class="col-6 col-lg-2 col-md-3">
                <label class="form-label">Status</label>
                <select name="status" class="form-select">
                    <option value="">All</option>
                    {% for val, label in status_choices %}
                    <option value="{{ val }}" {% if status_filter == val %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-xl-3 col-lg-4 col-md-6">
                <label class="form-label">Client</label>
                <select name="client" class="form-select">
                    <option value="">All clients</option>
                    {% for c in clients %}
                    <option value="{{ c.pk }}" {% if client_filter == c.pk|stringformat:"s" %}selected{% endif %}>{{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-6 col-md-3 col-lg-2">
                <label class="form-label">Invoice year</label>
                <select name="inv_year" class="form-select">
                    <option value="">Any year</option>
                    {% for y in invoice_year_choices %}
                    <option value="{{ y }}" {% if inv_year == y|stringformat:"d" %}selected{% endif %}>{{ y }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-6 col-md-3 col-lg-2">
                <label class="form-label">Invoice month</label>
                <select name="inv_month" class="form-select">
                    <option value="">Any month</option>
                    {% for val, label in month_choices %}
                    <option value="{{ val }}" {% if inv_month == val %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-12 col-lg-auto d-flex flex-wrap gap-2">
                <button type="submit" class="btn btn-primary px-4"><i class="bi bi-funnel me-1"></i>Apply</button>
                <a href="{% url reset_url %}" class="btn btn-outline-secondary">Reset</a>
            </div>
        </form>
    </div>
</div>
