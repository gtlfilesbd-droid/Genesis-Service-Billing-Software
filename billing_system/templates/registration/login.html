<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Genesis BillSoft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0D47A1 0%, #1565C0 50%, #1976D2 100%);
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            width: 100%; max-width: 420px;
            border: none; border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .login-header {
            background: #0D47A1;
            padding: 32px;
            text-align: center;
            color: white;
        }
        .login-header .logo-icon {
            width: 64px; height: 64px;
            background: rgba(255,255,255,0.15);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            font-size: 2rem;
        }
        .login-body { padding: 32px; background: #fff; }
        .form-control { border-radius: 10px; padding: 12px 16px; border: 1.5px solid #e0e0e0; }
        .form-control:focus { border-color: #1565C0; box-shadow: 0 0 0 3px rgba(21,101,192,0.1); }
        .input-group-text { border-radius: 10px 0 0 10px; background: #f8f9fa; border: 1.5px solid #e0e0e0; border-right: none; }
        .btn-login {
            width: 100%; padding: 13px;
            background: #1565C0; border: none;
            border-radius: 10px; font-weight: 600;
            font-size: 1rem; letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        .btn-login:hover { background: #0D47A1; transform: translateY(-1px); }
    </style>
</head>
<body>
    <div class="login-card card">
        <div class="login-header">
            <div class="logo-icon"><i class="bi bi-receipt-cutoff"></i></div>
            <h4 class="mb-1 fw-bold">Genesis BillSoft</h4>
            <p class="mb-0 opacity-75 small">Service Billing Management System</p>
        </div>
        <div class="login-body">
            <h5 class="mb-4 fw-semibold text-dark">Sign In to Your Account</h5>

            {% if messages %}
            {% for msg in messages %}
            <div class="alert alert-danger py-2 small"><i class="bi bi-exclamation-circle me-1"></i>{{ msg }}</div>
            {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-muted">USERNAME</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold small text-muted">PASSWORD</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-login text-white">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>
            <p class="text-center text-muted small mt-4 mb-0">
                <i class="bi bi-shield-lock me-1"></i>Secured Access Only
            </p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
